version: '3.8'

services:
  simulator:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - /models:/models:ro
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
