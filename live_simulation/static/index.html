<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Water Leak Detection - Live Dashboard</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script
        src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>

    <!-- Socket.IO -->
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>

    <!-- Custom Styles -->
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>
    <!-- Connection Status -->
    <div id="connectionStatus" class="connection-status disconnected">
        <span class="status-dot"></span>
        <span class="status-text">Disconnected</span>
    </div>

    <!-- Main Container -->
    <div class="container">
        <!-- Header -->
        <header class="header">
            <h1 class="title"><span class="icon">💧</span> Water Leak Detection</h1>
            <p class="subtitle">Real-Time AI Monitoring</p>
        </header>

        <!-- Alert Banner -->
        <div id="alertBanner" class="alert-banner hidden">
            <span class="alert-icon">⚠️</span>
            <strong>LEAK!</strong>
            <span id="alertDetails"></span>
            <button class="alert-close" onclick="closeAlert()">×</button>
        </div>

        <!-- Control Panel - Two Cards -->
        <div class="control-panel-container">
            <!-- Left Card: Controls -->
            <section class="control-card">
                <div class="controls">
                    <button id="startBtn" class="btn btn-primary" onclick="startSimulation()">
                        <span class="btn-icon">▶</span> Start
                    </button>
                    <button id="pauseBtn" class="btn btn-secondary" onclick="pauseSimulation()" disabled>
                        <span class="btn-icon">⏸</span> Pause
                    </button>
                    <button id="stopBtn" class="btn btn-danger" onclick="stopSimulation()" disabled>
                        <span class="btn-icon">⏹</span> Stop
                    </button>
                </div>

                <div class="simulation-info">
                    <span id="simulationStatus" class="status-badge status-idle">IDLE</span>
                    <span id="simulationTime" class="time-display">00:00:00</span>
                </div>
            </section>

            <!-- Right Card: AI Predictions -->
            <section class="control-card ai-card">
                <div class="ai-predictions">
                    <div class="ai-badge">
                        <span class="ai-label">🤖 Auto:</span>
                        <span id="autoencoderPrediction" class="ai-value">-</span>
                    </div>
                    <div class="ai-badge">
                        <span class="ai-label">🌲 IsoF:</span>
                        <span id="isolationPrediction" class="ai-value">-</span>
                    </div>
                </div>
            </section>
        </div>

        <!-- Main Content: Charts Only -->
        <div class="main-content">
            <!-- Charts Grid -->
            <section class="charts-grid">
                <div class="chart-card">
                    <div class="chart-header">
                        <h3 class="chart-title">Flow Rate</h3>
                        <span class="chart-info">60s</span>
                    </div>
                    <div class="chart-container">
                        <canvas id="flowRateChart"></canvas>
                    </div>
                </div>

                <div class="chart-card">
                    <div class="chart-header">
                        <h3 class="chart-title">Turbidity</h3>
                        <span class="chart-info">60s</span>
                    </div>
                    <div class="chart-container">
                        <canvas id="turbidityChart"></canvas>
                    </div>
                </div>

                <div class="chart-card full-width">
                    <div class="chart-header">
                        <h3 class="chart-title">Anomaly Timeline</h3>
                        <span class="chart-info">
                            <span class="legend-item">
                                <span class="legend-dot normal"></span> Normal
                            </span>
                            <span class="legend-item">
                                <span class="legend-dot anomaly"></span> Leak
                            </span>
                        </span>
                    </div>
                    <div class="chart-container">
                        <canvas id="anomalyChart"></canvas>
                    </div>
                </div>
            </section>
        </div>
    </div>

    <!-- Custom JavaScript -->
    <script src="/static/app.js"></script>
</body>

</html>
